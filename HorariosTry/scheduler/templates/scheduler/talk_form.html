{% extends 'base.html' %}

{% block title %}Submit a Talk{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 card shadow-sm p-4 mt-4">
        <h2 class="mb-4 text-primary">Submit a Talk</h2>
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="alert alert-danger">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <div class="mb-4">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
    </div>
</div>
{% endblock %}
